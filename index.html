<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polyphonic Locations</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      background: #f5f5f5;
    }

    /* 3D perspective tilt */
    .map-tilt {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      perspective: 900px;
      overflow: hidden;
    }
    #map {
      width: 400%;
      height: 400%;
      position: absolute;
      top: -150%;
      left: -150%;
      transform: rotateX(45deg) rotateZ(20deg);
      transform-origin: center center;
    }

    /* 3D pin marker - faces the viewer */
    .polyphonic-marker {
      background: none;
      border: none;
    }
    .polyphonic-marker .marker-pin {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* Counter-rotate so logo faces viewer upright */
      transform: rotateZ(-20deg) rotateX(-45deg) translateY(-30px);
      transform-origin: bottom center;
      filter: drop-shadow(0 6px 16px rgba(0,0,0,0.7)) drop-shadow(0 2px 4px rgba(0,0,0,0.4));
      transition: transform 0.2s ease;
    }
    .polyphonic-marker:hover .marker-pin {
      transform: rotateZ(-20deg) rotateX(-45deg) translateY(-38px);
    }
    .polyphonic-marker .marker-pin img {
      width: 56px;
      height: 56px;
    }
    /* Pin stem */
    .polyphonic-marker .pin-stem {
      width: 2px;
      height: 18px;
      background: #222;
      border-radius: 1px;
      margin-top: -2px;
    }
    /* Pin shadow on map surface */
    .polyphonic-marker .pin-shadow {
      width: 16px;
      height: 6px;
      background: rgba(0,0,0,0.25);
      border-radius: 50%;
      margin-top: 2px;
      filter: blur(2px);
    }

    /* Popup card styling */
    .leaflet-popup-content-wrapper {
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      min-width: 240px;
    }
    .leaflet-popup-tip {
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .location-popup {
      text-align: left;
    }
    .location-popup .popup-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
    }
    .location-popup .popup-info {
      padding: 12px 14px;
    }
    .location-popup h3 {
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }
    .location-popup p {
      margin: 0;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }

    .leaflet-popup-close-button {
      color: #fff !important;
      font-size: 18px !important;
      padding: 4px 8px !important;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    /* Hide zoom controls - they look odd on a tilted map */
    .leaflet-control-zoom { display: none; }
    /* Hide attribution on tilted view */
    .leaflet-control-attribution { display: none; }
  </style>
</head>
<body>
  <div class="map-tilt">
    <div id="map"></div>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const LOGO_ICON_URL = "https://static.wixstatic.com/shapes/9ce945_f31f554067034f6ab6211ecad57affbb.svg";

    // ============================================================
    // MAP STYLE - Change this value to switch themes
    // Options: "default", "light", "minimal", "grayscale",
    //          "muted", "warm", "watercolor", "teal", "toner"
    // ============================================================
    const MAP_STYLE = "toner";

    const MAP_STYLES = {
      default: {
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        attribution: '&copy; OpenStreetMap',
        options: { maxZoom: 19 }
      },
      light: {
        url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        options: { maxZoom: 20, subdomains: 'abcd' }
      },
      minimal: {
        url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        options: { maxZoom: 20, subdomains: 'abcd' }
      },
      grayscale: {
        url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        options: { maxZoom: 20, subdomains: 'abcd' }
      },
      muted: {
        url: 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        options: { maxZoom: 20, subdomains: 'abcd' }
      },
      warm: {
        url: 'https://tiles.stadiamaps.com/tiles/stamen_terrain/{z}/{x}/{y}{r}.png',
        attribution: '&copy; Stadia &copy; Stamen &copy; OpenStreetMap',
        options: { maxZoom: 18 }
      },
      watercolor: {
        url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
        attribution: '&copy; Stadia &copy; Stamen &copy; OpenStreetMap',
        options: { maxZoom: 16 }
      },
      toner: {
        url: 'https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}{r}.png',
        attribution: '&copy; Stadia &copy; Stamen &copy; OpenStreetMap',
        options: { maxZoom: 20 }
      },
      teal: {
        url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        options: { maxZoom: 20, subdomains: 'abcd' },
        css: 'filter: hue-rotate(160deg) saturate(1.4);'
      }
    };

    const locations = [
      {
        name: "Liberty Park",
        lat: 40.74948113077829,
        lng: -111.875514818678,
        image: "https://static.wixstatic.com/media/9ce945_0353965da9e04fa7817530546ce86ddc~mv2.png",
        address: "600 Harvey Milk Blvd, Salt Lake City, UT 84105, USA"
      }
    ];

    // ============================================================
    // MAP SETUP
    // ============================================================

    const center = locations.length > 0
      ? [locations[0].lat, locations[0].lng]
      : [40.7608, -111.891];

    const map = L.map('map', {
      center: center,
      zoom: 17,
      zoomControl: false,
      scrollWheelZoom: true,
      attributionControl: false
    });

    // Apply selected map style
    const style = MAP_STYLES[MAP_STYLE] || MAP_STYLES.default;
    L.tileLayer(style.url, {
      attribution: style.attribution,
      ...style.options
    }).addTo(map);

    if (style.css) {
      document.querySelector('.leaflet-tile-pane').style.cssText = style.css;
    }

    // 3D pin marker - logo stands upright off the tilted surface
    const logoIcon = L.divIcon({
      className: 'polyphonic-marker',
      html: `<div class="marker-pin">
        <img src="${LOGO_ICON_URL}" alt="Polyphonic" />
        <div class="pin-stem"></div>
        <div class="pin-shadow"></div>
      </div>`,
      iconSize: [56, 80],
      iconAnchor: [28, 80],
      popupAnchor: [0, -84]
    });

    // Add markers
    locations.forEach(loc => {
      const imageHtml = loc.image
        ? `<img class="popup-image" src="${loc.image}" alt="${loc.name}" />`
        : '';

      const popupContent = `
        <div class="location-popup">
          ${imageHtml}
          <div class="popup-info">
            <h3>${loc.name}</h3>
            <p>${loc.address || ''}</p>
          </div>
        </div>
      `;

      L.marker([loc.lat, loc.lng], { icon: logoIcon })
        .addTo(map)
        .bindPopup(popupContent, { maxWidth: 280, closeButton: true });
    });

    if (locations.length > 1) {
      const bounds = L.latLngBounds(locations.map(l => [l.lat, l.lng]));
      map.fitBounds(bounds, { padding: [50, 50] });
    }
  </script>
</body>
</html>
